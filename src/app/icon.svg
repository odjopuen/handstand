<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Squircle background -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#8B5CF6"/>

  <!-- Vertical body line -->
  <line x1="50" y1="14" x2="50" y2="86" stroke="#FFFDF8" stroke-width="5" stroke-linecap="round"/>

  <!-- Horizontal arms line (lower third) -->
  <line x1="14" y1="64" x2="86" y2="64" stroke="#FFFDF8" stroke-width="5" stroke-linecap="round"/>

  <!-- Head (large dot at bottom) -->
  <circle cx="50" cy="82" r="7" fill="#FFFDF8"/>

  <!-- Feet (small dot at top) -->
  <circle cx="50" cy="16" r="4.5" fill="#FFFDF8"/>

  <!-- Left hand -->
  <circle cx="17" cy="64" r="4.5" fill="#FFFDF8"/>

  <!-- Right hand -->
  <circle cx="83" cy="64" r="4.5" fill="#FFFDF8"/>

  <!-- Centre balance dot -->
  <circle cx="50" cy="50" r="3" fill="#FFFDF8" opacity="0.35"/>
</svg>
