<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Squircle background -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="#8B5CF6"/>

  <!-- Left arm (hand to shoulder) -->
  <line x1="28" y1="82" x2="50" y2="60" stroke="#FFFDF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Right arm (hand to shoulder) -->
  <line x1="72" y1="82" x2="50" y2="60" stroke="#FFFDF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Neck -->
  <line x1="50" y1="60" x2="50" y2="70" stroke="#FFFDF8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="50" cy="76" r="5.5" fill="#FFFDF8"/>

  <!-- Body -->
  <line x1="50" y1="60" x2="50" y2="26" stroke="#FFFDF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Left leg -->
  <line x1="50" y1="26" x2="20" y2="10" stroke="#FFFDF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Right leg -->
  <line x1="50" y1="26" x2="80" y2="10" stroke="#FFFDF8" stroke-width="3" stroke-linecap="round"/>

  <!-- Left hand dot -->
  <circle cx="28" cy="82" r="3.5" fill="#FFFDF8"/>

  <!-- Right hand dot -->
  <circle cx="72" cy="82" r="3.5" fill="#FFFDF8"/>

  <!-- Left foot dot -->
  <circle cx="18" cy="8" r="4" fill="#FFFDF8"/>

  <!-- Right foot dot -->
  <circle cx="82" cy="8" r="4" fill="#FFFDF8"/>
</svg>
